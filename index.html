<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rateios.pro - Em manutenção. Voltamos em breve!">
  <title>Rateios.pro - Em Manutenção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(66, 133, 244, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(234, 67, 53, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(52, 168, 83, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(251, 188, 5, 0.08) 0%, transparent 50%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0% {
        opacity: 0.6;
        transform: scale(1);
      }

      100% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    /* Grid pattern overlay */
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 20px;
      max-width: 600px;
    }

    /* Logo */
    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 48px;
      display: inline-block;
    }

    .logo span {
      display: inline-block;
    }

    /* Animated gear icon */
    .gear-wrap {
      margin-bottom: 32px;
      display: flex;
      justify-content: center;
    }

    .gear-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(66, 133, 244, 0.15), rgba(234, 67, 53, 0.15));
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: gearSpin 6s linear infinite;
      backdrop-filter: blur(10px);
    }

    @keyframes gearSpin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .gear-icon svg {
      animation: gearCounterSpin 6s linear infinite;
    }

    @keyframes gearCounterSpin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(-360deg);
      }
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #4285F4, #EA4335, #FBBC05, #34A853);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientFlow 4s ease-in-out infinite;
    }

    @keyframes gradientFlow {
      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      margin-bottom: 40px;
      font-weight: 300;
    }

    /* Status card */
    .status-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px 32px;
      margin-bottom: 32px;
      backdrop-filter: blur(20px);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FBBC05;
      animation: statusPulse 2s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(251, 188, 5, 0.5);
      }

      50% {
        opacity: 0.6;
        box-shadow: 0 0 0 8px rgba(251, 188, 5, 0);
      }
    }

    .status-text {
      font-weight: 500;
      color: #FBBC05;
    }

    /* Contact button */
    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.25);
    }

    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37, 211, 102, 0.35);
    }

    .btn-conta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      margin-top: 16px;
    }

    .btn-conta:hover {
      color: rgba(255, 255, 255, 0.8);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .footer-note {
      margin-top: 48px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.25);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      opacity: 0.3;
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 0.3;
      }

      90% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(-20px) translateX(30px);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .logo {
        font-size: 1.8rem;
      }

      .gear-icon {
        width: 64px;
        height: 64px;
      }

      .status-card {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <script>
    // Create floating particles
    var colors = ['#4285F4', '#EA4335', '#FBBC05', '#34A853'];
    var container = document.getElementById('particles');
    for (var i = 0; i < 20; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = Math.random() * 10 + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      container.appendChild(p);
    }
  </script>
